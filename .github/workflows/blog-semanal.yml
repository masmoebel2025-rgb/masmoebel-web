name: Blog semanal (Mia)

# De momento SOLO manual. El cron semanal queda apagado hasta validar (Paso 5/6).
on:
  workflow_dispatch:
  # schedule:
  #   # Martes 10:00 Europe/Madrid. GitHub usa UTC: verano(UTC+2)=08:00, invierno(UTC+1)=09:00.
  #   - cron: "0 8 * * 2"

# Necesario para que el bot pueda commitear el post a main.
permissions:
  contents: write

concurrency:
  group: blog-semanal
  cancel-in-progress: false

jobs:
  generar-y-publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias Python
        run: pip install anthropic

      - name: Generar articulo (Claude, solo datos reales)
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          python blog-automation/generar_articulo_blog.py \
            blog-automation/catalogo_blog.json \
            src/content/blog \
            src/content/blog > blog-automation/_props.json
          echo "Props generadas:"; cat blog-automation/_props.json
          # Si Claude invento serie/acabado o coló un precio -> abortar (no publicar basura)
          if [ "$(jq '._warnings | length' blog-automation/_props.json)" != "0" ]; then
            echo "::error::El articulo tiene avisos de validacion (datos inventados/precio). Se aborta."
            jq -r '._warnings[]' blog-automation/_props.json
            exit 1
          fi
          echo "slug=$(jq -r '.slug' blog-automation/_props.json)" >> "$GITHUB_OUTPUT"

      - name: Renderizar portada (Remotion BlogHero)
        run: |
          set -euo pipefail
          cd blog-automation/remotion
          npm install --no-audit --no-fund
          slug="${{ steps.gen.outputs.slug }}"
          npx remotion still BlogHero "../../public/images/blog/${slug}.png" \
            --props=../_props.json --log=error
          ls -la "../../public/images/blog/${slug}.png"

      - name: Build Astro (comprobacion)
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Commit y push del post
        run: |
          set -euo pipefail
          slug="${{ steps.gen.outputs.slug }}"
          git config user.name "mia-blog-bot"
          git config user.email "blog@masmoebel.es"
          git add "src/content/blog/${slug}.md" "public/images/blog/${slug}.png"
          if git diff --cached --quiet; then
            echo "Sin cambios que commitear."; exit 0
          fi
          git commit -m "feat(blog): post automatico — ${slug}"
          # Empuja a la MISMA rama del run: en main publica (Netlify); en una rama de prueba no.
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Avisar al owner si algo falla (WhatsApp, opcional)
        if: failure()
        env:
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_ID }}
          OWNER_PHONE: ${{ secrets.OWNER_PHONE }}
        run: |
          if [ -z "${WHATSAPP_TOKEN:-}" ] || [ -z "${WHATSAPP_PHONE_ID:-}" ] || [ -z "${OWNER_PHONE:-}" ]; then
            echo "Secrets de WhatsApp no configurados; se omite el aviso."
            exit 0
          fi
          texto="Blog semanal: la generacion automatica del post ha fallado. Revisa el run en GitHub Actions."
          curl -s -X POST "https://graph.facebook.com/v21.0/${WHATSAPP_PHONE_ID}/messages" \
            -H "Authorization: Bearer ${WHATSAPP_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"messaging_product\":\"whatsapp\",\"to\":\"${OWNER_PHONE}\",\"type\":\"template\",\"template\":{\"name\":\"alerta_sistema_codex\",\"language\":{\"code\":\"es\"},\"components\":[{\"type\":\"body\",\"parameters\":[{\"type\":\"text\",\"text\":\"${texto}\"}]}]}}" \
            && echo "Aviso enviado al owner."
