<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1917"/>
      <stop offset="100%" style="stop-color:#292524"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4d7c0f"/>
      <stop offset="100%" style="stop-color:#365314"/>
    </linearGradient>
    <linearGradient id="terra" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309"/>
      <stop offset="100%" style="stop-color:#92400e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <!-- Color swatches grid -->
  <!-- Row 1: Greens -->
  <rect x="100" y="80" width="140" height="140" rx="12" fill="#6b8e23" opacity="0.9"/>
  <text x="170" y="245" font-family="sans-serif" font-size="12" fill="#a8a29e" text-anchor="middle">Verde Salvia</text>
  <rect x="270" y="80" width="140" height="140" rx="12" fill="#556b2f" opacity="0.9"/>
  <text x="340" y="245" font-family="sans-serif" font-size="12" fill="#a8a29e" text-anchor="middle">Verde Oliva</text>
  <!-- Row 1: Earth tones -->
  <rect x="440" y="80" width="140" height="140" rx="12" fill="#a0522d" opacity="0.9"/>
  <text x="510" y="245" font-family="sans-serif" font-size="12" fill="#a8a29e" text-anchor="middle">Terracota</text>
  <rect x="610" y="80" width="140" height="140" rx="12" fill="#c4a882" opacity="0.9"/>
  <text x="680" y="245" font-family="sans-serif" font-size="12" fill="#a8a29e" text-anchor="middle">Arena</text>
  <!-- Row 1: Dark & neutral -->
  <rect x="780" y="80" width="140" height="140" rx="12" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="850" y="245" font-family="sans-serif" font-size="12" fill="#a8a29e" text-anchor="middle">Negro Mate</text>
  <rect x="950" y="80" width="140" height="140" rx="12" fill="#d4c5a9" opacity="0.9"/>
  <text x="1020" y="245" font-family="sans-serif" font-size="12" fill="#a8a29e" text-anchor="middle">Beige Cálido</text>
  <!-- Material samples row -->
  <rect x="100" y="280" width="320" height="180" rx="12" fill="#8B7355" opacity="0.8"/>
  <text x="260" y="380" font-family="Georgia, serif" font-size="16" fill="white" text-anchor="middle">Roble Natural</text>
  <text x="260" y="405" font-family="sans-serif" font-size="12" fill="#e5e0d8" text-anchor="middle">Chapa de madera real</text>
  <rect x="440" y="280" width="320" height="180" rx="12" fill="#2d2d2d"/>
  <text x="600" y="380" font-family="Georgia, serif" font-size="16" fill="white" text-anchor="middle">Fenix NTM</text>
  <text x="600" y="405" font-family="sans-serif" font-size="12" fill="#a8a29e" text-anchor="middle">Soft-touch autoreparable</text>
  <rect x="780" y="280" width="310" height="180" rx="12" fill="#57534e"/>
  <text x="935" y="380" font-family="Georgia, serif" font-size="16" fill="white" text-anchor="middle">Piedra Sinterizada</text>
  <text x="935" y="405" font-family="sans-serif" font-size="12" fill="#a8a29e" text-anchor="middle">Encimera sin juntas</text>
  <!-- Year badge -->
  <circle cx="600" cy="520" r="50" fill="none" stroke="#CA8A04" stroke-width="2"/>
  <text x="600" y="528" font-family="Georgia, serif" font-size="28" fill="#CA8A04" text-anchor="middle" font-weight="700">2026</text>
  <!-- Text overlay -->
  <rect x="0" y="530" width="1200" height="145" fill="#1C1917" opacity="0.85"/>
  <text x="600" y="590" font-family="Georgia, serif" font-size="38" fill="white" text-anchor="middle" font-weight="600">Tendencias en Cocinas 2026</text>
  <text x="600" y="630" font-family="sans-serif" font-size="18" fill="#CA8A04" text-anchor="middle">Colores, materiales y tecnología</text>
</svg>
