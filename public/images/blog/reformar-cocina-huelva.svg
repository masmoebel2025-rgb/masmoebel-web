<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1917"/>
      <stop offset="100%" style="stop-color:#292524"/>
    </linearGradient>
    <linearGradient id="gold4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#CA8A04"/>
      <stop offset="100%" style="stop-color:#EAB308"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg4)"/>
  <!-- Timeline / Steps -->
  <!-- Step line -->
  <line x1="150" y1="250" x2="1050" y2="250" stroke="#44403C" stroke-width="3"/>
  <!-- Step 1 -->
  <circle cx="200" cy="250" r="28" fill="#CA8A04"/>
  <text x="200" y="258" font-family="Georgia, serif" font-size="22" fill="#1C1917" text-anchor="middle" font-weight="700">1</text>
  <text x="200" y="310" font-family="sans-serif" font-size="13" fill="white" text-anchor="middle">Diseño</text>
  <text x="200" y="330" font-family="sans-serif" font-size="11" fill="#a8a29e" text-anchor="middle">1-2 sem</text>
  <!-- Step 2 -->
  <circle cx="380" cy="250" r="28" fill="#CA8A04"/>
  <text x="380" y="258" font-family="Georgia, serif" font-size="22" fill="#1C1917" text-anchor="middle" font-weight="700">2</text>
  <text x="380" y="310" font-family="sans-serif" font-size="13" fill="white" text-anchor="middle">Fabricación</text>
  <text x="380" y="330" font-family="sans-serif" font-size="11" fill="#a8a29e" text-anchor="middle">3-4 sem</text>
  <!-- Step 3 -->
  <circle cx="560" cy="250" r="28" fill="#CA8A04"/>
  <text x="560" y="258" font-family="Georgia, serif" font-size="22" fill="#1C1917" text-anchor="middle" font-weight="700">3</text>
  <text x="560" y="310" font-family="sans-serif" font-size="13" fill="white" text-anchor="middle">Demolición</text>
  <text x="560" y="330" font-family="sans-serif" font-size="11" fill="#a8a29e" text-anchor="middle">2-3 días</text>
  <!-- Step 4 -->
  <circle cx="740" cy="250" r="28" fill="#CA8A04"/>
  <text x="740" y="258" font-family="Georgia, serif" font-size="22" fill="#1C1917" text-anchor="middle" font-weight="700">4</text>
  <text x="740" y="310" font-family="sans-serif" font-size="13" fill="white" text-anchor="middle">Instalaciones</text>
  <text x="740" y="330" font-family="sans-serif" font-size="11" fill="#a8a29e" text-anchor="middle">5-7 días</text>
  <!-- Step 5 -->
  <circle cx="920" cy="250" r="28" fill="#CA8A04"/>
  <text x="920" y="258" font-family="Georgia, serif" font-size="22" fill="#1C1917" text-anchor="middle" font-weight="700">5</text>
  <text x="920" y="310" font-family="sans-serif" font-size="13" fill="white" text-anchor="middle">Montaje</text>
  <text x="920" y="330" font-family="sans-serif" font-size="11" fill="#a8a29e" text-anchor="middle">2-3 días</text>
  <!-- Connecting arrows -->
  <path d="M228 250 L352 250" stroke="#CA8A04" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M408 250 L532 250" stroke="#CA8A04" stroke-width="2"/>
  <path d="M588 250 L712 250" stroke="#CA8A04" stroke-width="2"/>
  <path d="M768 250 L892 250" stroke="#CA8A04" stroke-width="2"/>
  <!-- Location badge -->
  <rect x="440" y="380" width="320" height="100" rx="12" fill="#44403C" stroke="#CA8A04" stroke-width="1.5"/>
  <text x="600" y="420" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle">📍 Huelva</text>
  <text x="600" y="455" font-family="sans-serif" font-size="14" fill="#a8a29e" text-anchor="middle">Permisos, plazos y costes locales</text>
  <!-- Price ranges -->
  <rect x="100" y="380" width="300" height="100" rx="12" fill="#44403C" opacity="0.6"/>
  <text x="250" y="418" font-family="sans-serif" font-size="13" fill="#a8a29e" text-anchor="middle">Cosmética: 2.000-5.000 €</text>
  <text x="250" y="440" font-family="sans-serif" font-size="13" fill="#CA8A04" text-anchor="middle">Parcial: 5.000-12.000 €</text>
  <text x="250" y="462" font-family="sans-serif" font-size="13" fill="white" text-anchor="middle">Integral: 12.000-25.000 €</text>
  <rect x="800" y="380" width="300" height="100" rx="12" fill="#44403C" opacity="0.6"/>
  <text x="950" y="425" font-family="sans-serif" font-size="13" fill="#a8a29e" text-anchor="middle">6-8 semanas totales</text>
  <text x="950" y="455" font-family="sans-serif" font-size="13" fill="#CA8A04" text-anchor="middle">Presupuesto cerrado</text>
  <!-- Text overlay -->
  <rect x="0" y="530" width="1200" height="145" fill="#1C1917" opacity="0.85"/>
  <text x="600" y="590" font-family="Georgia, serif" font-size="38" fill="white" text-anchor="middle" font-weight="600">Reformar la Cocina en Huelva</text>
  <text x="600" y="630" font-family="sans-serif" font-size="18" fill="#CA8A04" text-anchor="middle">Guía práctica paso a paso</text>
</svg>
