<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f6ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="900" height="600" fill="url(#skyGrad)"/>

  <!-- Factory building main -->
  <rect x="150" y="300" width="600" height="250" fill="#8B4513"/>

  <!-- Roof -->
  <polygon points="150,300 450,100 750,300" fill="#654321"/>

  <!-- Chimney 1 -->
  <rect x="300" y="50" width="40" height="250" fill="#654321"/>
  <rect x="305" y="45" width="30" height="30" fill="#8B4513"/>

  <!-- Chimney 2 -->
  <rect x="610" y="80" width="40" height="220" fill="#654321"/>
  <rect x="615" y="75" width="30" height="30" fill="#8B4513"/>

  <!-- Doors -->
  <rect x="250" y="420" width="80" height="130" fill="#3a3a3a"/>
  <circle cx="325" cy="485" r="4" fill="#FFD700"/>

  <rect x="570" y="420" width="80" height="130" fill="#3a3a3a"/>
  <circle cx="645" cy="485" r="4" fill="#FFD700"/>

  <!-- Windows -->
  <g id="window">
    <rect x="200" y="200" width="60" height="60" fill="#87CEEB"/>
    <line x1="230" y1="200" x2="230" y2="260" stroke="#333" stroke-width="2"/>
    <line x1="200" y1="230" x2="260" y2="230" stroke="#333" stroke-width="2"/>
  </g>

  <use href="#window" x="100" y="0"/>
  <use href="#window" x="200" y="0"/>
  <use href="#window" x="300" y="0"/>
  <use href="#window" x="100" y="100"/>
  <use href="#window" x="200" y="100"/>
  <use href="#window" x="300" y="100"/>

  <!-- Warehouse section on right -->
  <rect x="550" y="250" width="150" height="300" fill="#7a6a5a"/>

  <!-- Loading dock -->
  <rect x="700" y="480" width="40" height="70" fill="#3a3a3a"/>
  <rect x="705" y="485" width="30" height="60" fill="#1a1a1a"/>

  <!-- Ground -->
  <rect x="0" y="550" width="900" height="50" fill="#8B7355"/>

  <!-- Parking lines -->
  <line x1="100" y1="560" x2="800" y2="560" stroke="white" stroke-width="2" stroke-dasharray="20,10"/>

  <!-- Text -->
  <text x="450" y="580" font-size="24" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial">Tres Generaciones de Calidad</text>
</svg>